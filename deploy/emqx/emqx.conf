node {
  name = "emqx@emqx"
  cookie = "cnc-monitor-secret"
  data_dir = "data"
  log_dir = "log"
}

listeners {
  tcp {
    default {
      bind = "0.0.0.0:1883"
      max_connections = 10240
      active_n = 100
      tcp_options {
        backlog = 1024
        send_timeout = 15s
        send_timeout_close = true
        recbuf = 10KB
        sndbuf = 10KB
        buffer = 10KB
        nodelay = true
      }
    }
  }

  ssl {
    default {
      bind = "0.0.0.0:8883"
      max_connections = 5120
      ssl_options {
        cacertfile = "etc/certs/cacert.pem"
        certfile = "etc/certs/cert.pem"
        keyfile = "etc/certs/key.pem"
      }
    }
  }

  ws {
    default {
      bind = "0.0.0.0:8083"
      max_connections = 5120
      websocket {
        mqtt_path = "/mqtt"
        mqtt_piggyback = "single"
        compress = true
      }
    }
  }
}

mqtt {
  max_packet_size = 256KB
  max_clientid_len = 128
  max_topic_levels = 128
  max_qos_allowed = 2
  retain_available = true
  wildcards_subscription = true

  session {
    max_inflight = 32
    max_mqueue_len = 4096
    mqueue_priorities = ""
    mqueue_default_priority = 0
    upgrade_qos = false
    session_expiry_interval = 2h
    message_retry_interval = 30s
    await_rel_timeout = 300s
    max_awaiting_rel = 1000
  }
}

topic {
  qos1_max_pending = 1000
  qos2_max_pending = 500
  qos1_pending_ttl = 30s
  qos2_pending_ttl = 60s
}

retainer {
  enable = true
  msg_retention_interval = 5m
  storage_type = disc_only
  max_retained_messages = 100000
  max_payload_size = 1MB
}

log {
  file {
    default {
      enable = true
      level = warning
      path = "log/emqx.log"
      rotation_count = 10
      rotation_size = 50MB
    }
  }
}

modules {
  retainer {
    enable = true
    backend {
      type = built_in_database
      storage_type = disc_only
    }
  }
}

authorization {
  cache {
    enable = true
    ttl = 1m
    max_size = 32
  }
}
