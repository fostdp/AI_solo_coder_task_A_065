<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精密数控机床主轴健康监控与剩余寿命预测系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1>🔧 主轴健康监控中心</h1>
            <span class="subtitle">航空零部件加工车间 · 五轴数控机床群</span>
        </div>
        <div class="header-right">
            <div class="status-badge online">
                <span class="dot"></span>
                系统在线
            </div>
            <div class="time-display" id="current-time"></div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>📊 本月统计</h3>
                <div class="stats-grid" id="monthly-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-total-alarms">-</div>
                        <div class="stat-label">总告警数</div>
                    </div>
                    <div class="stat-card critical">
                        <div class="stat-value" id="stat-critical">-</div>
                        <div class="stat-label">严重告警</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-value" id="stat-warning">-</div>
                        <div class="stat-label">预警</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-health">-</div>
                        <div class="stat-label">平均健康分</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>🏆 健康评分排行榜</h3>
                <div class="ranking-list" id="ranking-list">
                </div>
            </div>

            <div class="sidebar-section">
                <h3>⚠️ 最新告警</h3>
                <div class="alarm-list" id="alarm-list">
                </div>
            </div>
        </aside>

        <main class="content">
            <div class="content-header">
                <div class="machine-selector">
                    <label>选择机床:</label>
                    <select id="machine-select">
                    </select>
                </div>
                <div class="machine-info" id="machine-info">
                </div>
            </div>

            <div class="spindle-section">
                <div class="section-header">
                    <h2>🛠️ 主轴剖面图</h2>
                    <div class="legend">
                        <span class="legend-item"><span class="dot green"></span> 正常 &lt;2.8mm/s</span>
                        <span class="legend-item"><span class="dot yellow"></span> 预警 2.8-7.1mm/s</span>
                        <span class="legend-item"><span class="dot red"></span> 告警 &gt;7.1mm/s</span>
                    </div>
                </div>
                <div class="spindle-canvas-container">
                    <canvas id="spindle-canvas" width="800" height="250"></canvas>
                </div>
                <div class="sensor-info" id="sensor-info">
                    <span class="hint">👆 点击传感器圆点查看详细数据</span>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>📈 振动时域波形 (最近1小时)</h3>
                        <div class="chart-controls">
                            <select id="waveform-sensor">
                            </select>
                        </div>
                    </div>
                    <canvas id="waveform-canvas" width="600" height="200"></canvas>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h3>📊 振动频谱分析</h3>
                        <div class="chart-controls">
                            <select id="spectrum-sensor">
                            </select>
                        </div>
                    </div>
                    <canvas id="spectrum-canvas" width="600" height="200"></canvas>
                </div>

                <div class="chart-card full-width">
                    <div class="chart-header">
                        <h3>🌊 振动频谱瀑布图</h3>
                        <div class="chart-controls">
                            <select id="waterfall-sensor">
                            </select>
                            <span class="time-range">时间跨度: 30分钟</span>
                        </div>
                    </div>
                    <canvas id="waterfall-canvas" width="1240" height="250"></canvas>
                </div>

                <div class="chart-card full-width">
                    <div class="chart-header">
                        <h3>📉 RUL历史趋势</h3>
                    </div>
                    <canvas id="rul-canvas" width="1240" height="200"></canvas>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="sensor-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">传感器详情</h3>
                <button class="close-btn" onclick="closeSensorModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body">
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/spindle-canvas.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
