version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: cnc-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./deploy/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./deploy/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - CLICKHOUSE_DB=cnc_monitor
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cnc-network

  emqx:
    image: emqx/emqx:5.3
    container_name: cnc-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - ./deploy/emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
    environment:
      - EMQX_NAME=cnc-mqtt
      - EMQX_HOST=emqx
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - cnc-network

  rust-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cnc-backend
    restart: unless-stopped
    ports:
      - "5555:5555/udp"
      - "8080:8080"
      - "8081:8081"
      - "9090:9090"
    depends_on:
      clickhouse:
        condition: service_healthy
      emqx:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/config.toml
      - RUST_LOG=info
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - MQTT_BROKER=tcp://emqx:1883
    volumes:
      - ./backend/config.toml:/app/config.toml:ro
    networks:
      - cnc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cnc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - rust-backend
    networks:
      - cnc-network

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: cnc-simulator
    restart: unless-stopped
    depends_on:
      - rust-backend
    environment:
      - UDP_TARGET=rust-backend:5555
      - MACHINE_COUNT=40
      - SAMPLE_INTERVAL_MS=100
      - ANOMALY_INJECT=true
      - DEGRADATION_INJECT=true
    volumes:
      - ./simulator:/app
    networks:
      - cnc-network

  prometheus:
    image: prom/prometheus:v2.48
    container_name: cnc-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - cnc-network

  grafana:
    image: grafana/grafana:10.2
    container_name: cnc-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - cnc-network

volumes:
  clickhouse_data:
  emqx_data:
  prometheus_data:
  grafana_data:

networks:
  cnc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
